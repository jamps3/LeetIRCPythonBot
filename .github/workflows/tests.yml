name: Run Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: test (3.13)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --locked

      - name: Setup test environment
        run: |
          # Create a basic .env file for testing
          echo "BOT_NAME=TestBot" > .env
          echo "BOT_VERSION=test" >> .env
          echo "IRC_NICKNAME=test_bot" >> .env
          echo "IRC_REALNAME=Test Bot" >> .env
          echo "IRC_IDENT=testbot" >> .env
          echo "SERVER_HOST=irc.example.com" >> .env
          echo "SERVER_PORT=6667" >> .env
          echo "SERVER_NAME=TestServer" >> .env
          echo "CHANNELS=#test" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          echo "TAMAGOTCHI_ENABLED=true" >> .env
          echo "USE_NOTICES=false" >> .env

          # Debug: Show the environment
          echo "Current directory: $(pwd)"
          echo "Python version: $(uv run python --version)"
          echo "Python path:"
          uv run python -c "import sys; [print(f'  {p}') for p in sys.path]"
          echo "Files in current directory:"
          ls -la

      - name: Run tests
        run: |
          # Set PYTHONPATH to include current directory
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          echo "Running all tests with pytest (parallel)..."
          uv run pytest -v --tb=short -n auto --junitxml=test-results.xml --cov=src --cov-report=json:coverage.json
        env:
          # Set dummy environment variables for testing
          IRC_NICKNAME: test_bot
          BOT_NAME: TestBot
          TAMAGOTCHI_ENABLED: true
          USE_NOTICES: false

      - name: Generate Shields badge endpoints
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          import xml.etree.ElementTree as ET

          os.makedirs("badges", exist_ok=True)

          def write_badge(filename, label, message, color):
              with open(os.path.join("badges", filename), "w", encoding="utf-8") as f:
                  json.dump(
                      {
                          "schemaVersion": 1,
                          "label": label,
                          "message": message,
                          "color": color,
                      },
                      f,
                      separators=(",", ":"),
                  )

          tests = failures = errors = skipped = 0
          try:
              root = ET.parse("test-results.xml").getroot()
              suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
              for suite in suites:
                  tests += int(suite.attrib.get("tests", 0))
                  failures += int(suite.attrib.get("failures", 0))
                  errors += int(suite.attrib.get("errors", 0))
                  skipped += int(suite.attrib.get("skipped", 0))
              passed = max(tests - failures - errors - skipped, 0)
              test_color = "brightgreen" if failures == 0 and errors == 0 else "red"
              write_badge("tests.json", "tests", f"{passed} passed", test_color)
          except Exception:
              write_badge("tests.json", "tests", "unknown", "lightgrey")

          try:
              with open("coverage.json", encoding="utf-8") as f:
                  coverage = json.load(f)
              percent = float(coverage["totals"]["percent_covered"])
              if percent >= 90:
                  color = "brightgreen"
              elif percent >= 80:
                  color = "green"
              elif percent >= 70:
                  color = "yellowgreen"
              elif percent >= 60:
                  color = "yellow"
              else:
                  color = "red"
              write_badge("coverage.json", "coverage", f"{percent:.1f}%", color)
          except Exception:
              write_badge("coverage.json", "coverage", "unknown", "lightgrey")
          PY

      - name: Publish badge endpoints
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir badge-pages
          cp badges/*.json badge-pages/
          cd badge-pages
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b badges
          git add .
          git commit -m "Update badge endpoints"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-3.13
          path: |
            test-results.xml
            coverage.json
            badges/*.json
          if-no-files-found: ignore
          retention-days: 30

  lint:
    name: lint (3.13)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install linting tools
        run: uv sync --dev --locked

      - name: Check code formatting with Ruff
        run: |
          uv run ruff format --check --diff .

      - name: Lint with Ruff
        run: |
          uv run ruff check .

  security:
    name: security (3.13)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install security tools
        run: uv sync --dev --locked

      - name: Run Ruff security checks
        run: |
          uv run ruff check --select S .

      - name: Check for known security vulnerabilities
        run: |
          uv run pip-audit --cache-dir .pip-audit-cache --progress-spinner off -f json -o pip-audit-report.json

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: |
            pip-audit-report.json
          retention-days: 30
