name: Run Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (3.13)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install minimal required dependencies for testing
          pip install python-dotenv pytest pytest-xdist
          # Don't install optional dependencies as they are mocked in tests
          # Install test dependencies if we had a requirements.txt
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Setup test environment
        run: |
          # Create a basic .env file for testing
          echo "BOT_NAME=TestBot" > .env
          echo "BOT_VERSION=test" >> .env
          echo "IRC_NICKNAME=test_bot" >> .env
          echo "IRC_REALNAME=Test Bot" >> .env
          echo "IRC_IDENT=testbot" >> .env
          echo "SERVER_HOST=irc.example.com" >> .env
          echo "SERVER_PORT=6667" >> .env
          echo "SERVER_NAME=TestServer" >> .env
          echo "CHANNELS=#test" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          echo "TAMAGOTCHI_ENABLED=true" >> .env
          echo "USE_NOTICES=false" >> .env

          # Debug: Show the environment
          echo "Current directory: $(pwd)"
          echo "Python version: $(python --version)"
          echo "Python path:"
          python -c "import sys; [print(f'  {p}') for p in sys.path]"
          echo "Files in current directory:"
          ls -la

      - name: Run tests
        run: |
          # Set PYTHONPATH to include current directory
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          echo "Running all tests with pytest (parallel)..."
          python -m pytest -v --tb=short -n auto
        env:
          # Set dummy environment variables for testing
          IRC_NICKNAME: test_bot
          BOT_NAME: TestBot
          TAMAGOTCHI_ENABLED: true
          USE_NOTICES: false

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-3.13
          path: |
            test-results.txt
            test-coverage.txt
          if-no-files-found: ignore
          retention-days: 30

  lint:
    name: lint (3.13)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.13

      - name: Check code formatting with Ruff
        run: |
          ruff format --check --diff .

      - name: Lint with Ruff
        run: |
          ruff check .

  security:
    name: security (3.13)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.13 pip-audit==2.10.0

      - name: Run Ruff security checks
        run: |
          ruff check --select S .

      - name: Check for known security vulnerabilities
        run: |
          pip-audit -r requirements.txt -r requirements-dev.txt --progress-spinner off -f json -o pip-audit-report.json

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: |
            pip-audit-report.json
          retention-days: 30
