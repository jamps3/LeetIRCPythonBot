name: Auto Format Code

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    name: format (3.13)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install Ruff
      run: |
        python -m pip install --upgrade pip
        pip install ruff==0.15.13

    - name: Check formatting with Ruff (no writes)
      run: |
        ruff format --check --diff .
        ruff check --select I .
